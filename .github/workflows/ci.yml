name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Linux: SDL3 is compiled from source (FetchContent) and needs the X11/Wayland,
      # OpenGL/EGL, audio and udev/dbus dev headers; the engine also links Python and
      # uses lz4/zstd. Install the dev packages before configuring. (Vulkan is optional
      # and left out — the Linux build uses the OpenGL backend.)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libwayland-dev wayland-protocols libdecor-0-dev \
            libxkbcommon-dev libegl1-mesa-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libdbus-1-dev libibus-1.0-dev \
            liblz4-dev libzstd-dev python3-dev

      # FetchContent checkouts (SDL3, glm, nlohmann_json) are cached on the
      # configure hash so CI does not re-clone them on every run.
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # Linux: build a self-contained editor package like Windows — bundle cmake so a
      # user only needs a C++ compiler, use static mbedTLS so there's no external
      # libcrypto/OpenSSL dependency, and deploy into the workspace for packaging.
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DHE_BUNDLE_CMAKE=ON -DHE_PREFER_MBEDTLS=ON "-DDEPLOY_DIR=${{ github.workspace }}/package"

      # Windows: build a self-contained editor package — bundle cmake, deploy into the
      # workspace for the packaging step, and use static mbedTLS so there's no external
      # OpenSSL DLL dependency (a clean PC then needs only the C++ toolchain at build time).
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DHE_BUNDLE_CMAKE=ON -DHE_PREFER_MBEDTLS=ON "-DDEPLOY_DIR=${{ github.workspace }}/package"

      - name: Build
        run: cmake --build build -j 4

      # The editor POST_BUILD deployed a self-contained bundle into package/Editor:
      # HorizonEditor.exe + engine DLLs + SDL3 + EngineContent/Fonts/Images + Vulkan
      # Shaders + the bundled cmake + the CPython runtime (python3XY.dll/.zip/._pth).
      # Zip it and upload as a downloadable artifact (the "Artifacts" box on the run).
      - name: Package Windows editor
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "package/Editor/*" -DestinationPath "HorizonEditor-windows-x64.zip" -Force

      - name: Upload Windows editor package
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: HorizonEditor-windows-x64
          path: HorizonEditor-windows-x64.zip
          if-no-files-found: error

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      # ── macOS: build the self-contained .app + DMG installer ────────────────────
      # The `dmg` custom target runs scripts/package_macos.sh, which stages
      # out/deploy/Editor into HorizonEditor.app (engine dylibs BFS-bundled + rpaths
      # rewritten), ad-hoc code-signs it (no Developer ID / secrets — cert-free), and
      # produces out/HorizonEditor-<version>.dmg. Runs after the tests so a packaging
      # failure surfaces without masking the build+test result.
      - name: Package macOS editor (DMG)
        if: runner.os == 'macOS'
        run: cmake --build build --target dmg

      - name: Upload macOS editor package
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: HorizonEditor-macos-arm64
          path: out/HorizonEditor-*.dmg
          if-no-files-found: error

      # ── Linux: tarball the self-contained editor bundle ─────────────────────────
      # The editor POST_BUILD deployed package/Editor: HorizonEditor + engine .so
      # (found next to it via the $ORIGIN rpath) + SDL3 + EngineContent/Fonts/Images +
      # bundled cmake + libpython + the Game runtime. tar (not zip) preserves the
      # executable bit on the binaries.
      - name: Package Linux editor
        if: runner.os == 'Linux'
        run: tar czf HorizonEditor-linux-x64.tar.gz -C package Editor

      - name: Upload Linux editor package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: HorizonEditor-linux-x64
          path: HorizonEditor-linux-x64.tar.gz
          if-no-files-found: error
